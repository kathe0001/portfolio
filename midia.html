<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prontuário Eletrônico</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body style="background-image: url('medico2.webp'); background-repeat: no-repeat;background-size: cover;">
  <!-- Navbar -->
  <nav class="navbar navbar-dark " style="background-color: rgb(67, 54, 155);">
    <div class="container-fluid justify-content-center">
      <span class="navbar-brand mb-0 h1">
        <i class="bi bi-hospital"></i>
        Prontuário Eletrônico
      </span>
    </div>
  </nav>
  
  <div class="container mt-4">
    
    <form id="formulario">

      <!-- Dados do Paciente -->
      <div class="card mb-4">
        <div class="card-header  text-white text-center" style="background-color: rgb(67, 54, 155);">
          <i class="bi bi-person"></i>
          Dados do Paciente
        </div>
        
        <div class="card-body">
          <div class="row">
            
            <div class="col-md-6 mb-3">
              <label class="form-label">Nome</label>
              <input type="text" id="nome" class="form-control" placeholder="Digite seu nome" required>
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label">Idade</label>
              <input type="number" id="idade" class="form-control" min="1" max="100"  required>
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label">Sexo</label>
              <select id="sexo" class="form-select" required>
                <option value="">Selecione</option>
                <option>Masculino</option>
                <option>Feminino</option>
              </select>
            </div>

          </div>
        </div>
      </div>

      <!-- Sinais Vitais -->
      <div class="card mb-4">
        <div class="card-header  text-white text-center" style="background-color: rgb(67, 54, 155);",>
          <i class="bi bi-heart-pulse"></i>
          Sinais Vitais
        </div>

        <div class="card-body">
          <div class="row">

            <div class="col-md-3 mb-3">
              <label class="form-label">Pressão Arterial</label>
              <input type="text" id="pressao" class="form-control" placeholder="Ex: 120/90" required>
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label">Temperatura</label>
              <input type="text" id="temperatura" class="form-control" placeholder="Ex: 36,5" min="36,5" max="46,5">
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label">Frequência Cardíaca</label>
              <input type="number" id="frequencia" class="form-control" min="60" max="226" required>
            </div>

            <div class="col-md-3 mb-3">
              <label class="form-label">Saturação</label>
              <input type="number" id="saturacao" class="form-control" min="95" max="100" required>
            </div>

          </div>
        </div>
      </div>

      <!-- Evolução -->
      <div class="card mb-4">
        <div class="card-header text-white text-center" style="background-color: rgb(67, 54, 155);">
        <i class="bi bi-journal-text"></i>
          Evolução do Paciente
        </div>
        
        <div class="card-body">
          <textarea id="evolucao" class="form-control" rows="4"></textarea>
        </div>
      </div>
      
      <!-- Medicação -->
      <div class="card mb-4">
        <div class="card-header  text-white text-center fw-bold" style="background-color: rgb(67, 54, 155);">
          <i class="bi bi-capsule"></i>
          Medicação
        </div>
        
        <div class="card-body">
          <div class="row">
            
            <div class="col-md-6 mb-3">
              <input type="text" id="medicamento" class="form-control" placeholder="Medicamento" required>
            </div>

            <div class="col-md-3 mb-3">
              <input type="text" id="dosagem" class="form-control" placeholder="Dosagem" required>
            </div>

            <div class="col-md-3 mb-3">
              <input type="time" id="horario" class="form-control" required>
            </div>

          </div>
        </div>
      </div>
      
      <!-- Botão -->
      <div class="text-end mb-5">
        <button type="submit" class="btn btn-primary btn-lg shadow" style="background-color: rgb(67, 54, 155);">
          <i class="bi bi-save"></i>
          Salvar Prontuário
        </button>
      </div>

      
      <!-- Resultado -->
       <div id="caixa" class="card shadow d-none">
        <div class="card-header text-white" style="background-color: rgb(67, 54, 155);">
          Resultado do Prontuário
        </div>
        <div class="card-body"></div>
       </div>
      
      
      <div class="toast position-fixed bottom-0 end-0 p-3" id="toastSucesso">
        <div class="toast-header">
          <strong class="me-auto">Sistema</strong>
          <button type="button" class="btn-close" data-bs-dismiss="toast"></button>
        </div>
        <div class="toast-body">
          Prontuário salvo com sucesso
        </div>
      </div>
  </form>

  <!-- JS externo -->
  <script src="midia.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
